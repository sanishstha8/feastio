{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FEASTIO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="spinner"></div>
  <p style="color:var(--orange);font-weight:600">FEASTIO</p>
</div>

<!-- Toast Container -->
<div id="toast-container"></div>

<!-- ── Landing Page ───────────────────────────────────────────── -->
<div id="page-landing" class="page">
  <div class="landing-header">
    <div class="landing-logo">
      <div class="landing-logo-icon">🍽️</div>
      <div>
        <h1>FEASTIO</h1>
        <p>Complete Restaurant Management System</p>
      </div>
    </div>
  </div>

  <div class="landing-roles"  style="display: none;">
    <div class="role-card">
      <div class="role-icon" style="background:#f5f3ff">👔</div>
      <h3>Manager</h3>
      <p>Full system access</p>
    </div>
    <div class="role-card">
      <div class="role-icon" style="background:#eff6ff">🧑‍🍳</div>
      <h3>Waiter</h3>
      <p>Tables & orders</p>
    </div>
    <div class="role-card">
      <div class="role-icon" style="background:#fff7ed">👨‍🍳</div>
      <h3>Kitchen</h3>
      <p>Order preparation</p>
    </div>
  </div>

  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" data-panel="login-panel">Login</button>
      <button class="auth-tab" data-panel="register-panel">Register</button>
    </div>

    <!-- Login -->
    <div id="login-panel" class="auth-panel">
      <form id="login-form" style="display:flex;flex-direction:column;gap:1rem">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input class="form-input" type="email" id="login-email" placeholder="email@restaurant.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input class="form-input" type="password" id="login-password" placeholder="Enter your password" required>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">Login</button>
      </form>
      
    </div>

    <!-- Register -->
    <div id="register-panel" class="auth-panel hidden">
      <form id="register-form" style="display:flex;flex-direction:column;gap:1rem">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <input class="form-input" id="reg-name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input class="form-input" type="email" id="reg-email" placeholder="email@restaurant.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input class="form-input" type="password" id="reg-password" placeholder="Create a password" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-role">Role</label>
          <select class="form-select" id="reg-role">
            <option value="manager">Manager</option>
            <option value="waiter" selected>Waiter</option>
            <option value="kitchen">Kitchen Staff</option>
            <option value="cashier">Cashier</option>
          </select>
        </div>
        <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">Register</button>
      </form>
    </div>
  </div>
</div>

<!-- ── Manager App Shell ──────────────────────────────────────── -->
<div id="page-app" class="page hidden">
  <div id="app-shell"></div>
</div>

<!-- ── Staff Portal ───────────────────────────────────────────── -->
<div id="page-staff" class="page hidden">
  <div id="staff-portal"></div>
</div>

<div id="page-cashier" class="page hidden">
  <div id="cashier-portal"></div>
</div>

<script src="{% static 'js/api.js' %}"></script>
<script src="{% static 'js/app.js' %}"></script>
</body>
</html>
